name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Bun checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Audit dependencies
        run: bun audit
        continue-on-error: true

      - name: Semgrep
        run: |
          python -m pip install --upgrade semgrep
          semgrep --config auto
        continue-on-error: true
