name: aat-ee

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL-}
    NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL-}
    NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID-}
    NEXT_PUBLIC_ONE_TAP_CLIENT_ID: ${NEXT_PUBLIC_ONE_TAP_CLIENT_ID-}
    NEXT_PUBLIC_PREMIUM_PAYMENT_LINK: ${NEXT_PUBLIC_PREMIUM_PAYMENT_LINK-}
    NEXT_PUBLIC_PREMIUM_PLUS_PAYMENT_LINK: ${NEXT_PUBLIC_PREMIUM_PLUS_PAYMENT_LINK-}
    NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY-}
    NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL-}
    DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION-}
  secrets:
    - next_server_actions_encryption_key

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
  REDIS_URL: redis://redis:6379

x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "5"

services:
  postgres:
    image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    restart: unless-stopped
    shm_size: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'psql -v ON_ERROR_STOP=1 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -tAc "SELECT 1" >/dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - aat-ee-postgres-data:/var/lib/postgresql
    logging: *bounded-logging

  redis:
    image: redis:7.4.7-alpine@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    logging: *bounded-logging

  migrate:
    build:
      <<: *app-build
      target: operations
    env_file: /etc/opsctl/services/aat-ee.env
    environment:
      <<: *app-environment
      EMBEDDED_CRON_DISABLED: "true"
    command: ["bun", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    init: true
    logging: *bounded-logging

  restore:
    build:
      <<: *app-build
      target: operations
    env_file: /etc/opsctl/services/aat-ee.env
    environment:
      DATABASE_URL: ""
      RESTORE_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDED_CRON_DISABLED: "true"
    command: ["bun", "scripts/restore-db-backup.ts", "--once", "--yes"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    init: true
    logging: *bounded-logging

  app:
    build:
      <<: *app-build
      target: runner
    restart: unless-stopped
    init: true
    env_file: /etc/opsctl/services/aat-ee.env
    environment:
      <<: *app-environment
      HOSTNAME: 0.0.0.0
      PORT: "8080"
      STAGING_READ_ONLY: ${STAGING_READ_ONLY:-true}
    ports:
      - 127.0.0.1:8080:8080
    depends_on:
      redis:
        condition: service_healthy
      restore:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/').then((response)=>process.exit(response.status<500?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    logging: *bounded-logging

volumes:
  aat-ee-postgres-data:
    name: aat-ee-postgres-data

secrets:
  next_server_actions_encryption_key:
    environment: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
